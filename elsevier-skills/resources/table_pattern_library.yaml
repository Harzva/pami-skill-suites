use_scope: Reusable table-structure patterns only; do not copy table values or layouts.
beautiful_table_patterns:
- pattern_id: baseline-comparison-table
  columns:
  - method
  - venue/year or category
  - metric group
  - best/second-best markers
  - notes
  best_for: central quantitative claim
  risk: Unclear fairness protocol or missing statistical support.
- pattern_id: ablation-staircase-table
  columns:
  - variant
  - component toggles
  - primary metric
  - secondary metric
  - delta from baseline
  best_for: showing contribution of each module
  risk: Ablations without hypothesis read as arbitrary.
- pattern_id: dataset-protocol-table
  columns:
  - dataset
  - task
  - split
  - metric
  - preprocessing
  - license/availability
  best_for: reproducibility and experimental clarity
  risk: Dataset leakage or ambiguous splits.
- pattern_id: complexity-efficiency-table
  columns:
  - method
  - parameters/FLOPs/time
  - memory
  - accuracy
  - trade-off note
  best_for: method efficiency claims
  risk: Hardware/software not specified.
