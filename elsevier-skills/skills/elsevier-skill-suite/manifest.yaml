official_source_policy:
  priority:
  - journal official rule
  - publisher official rule
  - repository best-practice recommendation
  - template-paper observation
  require_live_check_for:
  - author agreement
  - copyright
  - license
  - open access
  - fee/APC
  - page limit
  - submission system
  - AI disclosure
  - data/code policy
  - final files
official_source_registry:
  json: ../../resources/official_source_registry.json
  yaml: ../../resources/official_source_registry.yaml
paper_corpus:
  manifest: paper_templates/corpus_manifest.yaml
  cards: paper_templates/cards/
  structure_maps: paper_templates/extracted_structure_maps/
  mining_notes: paper_templates/mining_notes/
  default_miner_skill: elsevier-paper-miner
  copyright_safety_policy: Study structure only; do not copy source text, figures,
    tables, captions, equations, or paper-specific claims.
evaluations:
  benchmark_version: 1.2.0
  tasks_dir: evals/tasks
  rubrics_dir: evals/rubrics
  sample_outputs_dir: evals/sample_outputs
  required_task_count: 8
  run_command: python scripts/run_evals.py
