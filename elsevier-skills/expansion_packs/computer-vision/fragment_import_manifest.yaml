- journal_id: cviu
  source_fragment: skills/elsevier-skill-suite/static/journals/cviu.md
  advanced_skill_source: skills-advanced/journals/cviu-writing
  import_action: reference-existing-fragment
  default_visible: false
  maturity_level: L3
- journal_id: image-and-vision-computing
  source_fragment: skills/elsevier-skill-suite/static/journals/image-and-vision-computing.md
  advanced_skill_source: skills-advanced/journals/image-and-vision-computing-writing
