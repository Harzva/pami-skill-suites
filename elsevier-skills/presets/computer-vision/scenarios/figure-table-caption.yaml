reviewer_risk_checklist:
- Novelty or contribution is not clearly separated from prior work.
- Claims are not tied to experiments, tables, figures, citations, or reviewer evidence.
- Visual evidence or captions are not self-contained enough for expert review.
- Mutable publisher or journal rules are used without live verification.
- Template-paper mining copies content instead of extracting reusable structure.
