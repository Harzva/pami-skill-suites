scenario_id: writing-related-work
title: Writing / related-work scenario
release_version: 1.5.0
preset_id: data-mining
preset_title: Data Mining
publisher_family: Elsevier
visibility: optional preset scenario; not a default top-level skill
context_policy: Do not add preset scenarios to default skills/. Route through the suite macro skill and internal fragments.
purpose: Audit and improve a discipline-specific manuscript introduction and related work section.
example_user_prompt: Use the Data Mining preset to handle this writing / related-work scenario for a Elsevier journal manuscript;
  show selected modules, warnings, risks, and output contract.
target_journal_candidates:
- id: information-sciences
  title: Information Sciences
  maturity_level: L4
  needs_reverification: true
- id: kbs
  title: Knowledge-Based Systems
  maturity_level: L4
  needs_reverification: true
- id: data-knowledge-engineering
  title: Data & Knowledge Engineering
  maturity_level: L3
  needs_reverification: true
selected_skills:
- skills/elsevier-skill-suite
- skills/elsevier-writing
- skills/elsevier-citation
selected_modules:
  suite_router: skills/elsevier-skill-suite
  journal_modules:
  - skills/elsevier-skill-suite/static/journals/information-sciences.md
  - skills/elsevier-skill-suite/static/journals/kbs.md
  - skills/elsevier-skill-suite/static/journals/data-knowledge-engineering.md
  component_modules:
  - skills/elsevier-skill-suite/static/components/abstract.md
  - skills/elsevier-skill-suite/static/components/introduction.md
  - skills/elsevier-skill-suite/static/components/related-work.md
  - skills/elsevier-skill-suite/static/components/contribution-positioning.md
  - skills/elsevier-skill-suite/static/components/references.md
  - skills/elsevier-skill-suite/static/components/official-source-audit.md
  submission_modules: []
required_warnings:
  official_source_warning: true
  copyright_safe_paper_mining_warning: false
  context_visibility_warning: true
reviewer_risk_checklist:
- Novelty or contribution is not clearly separated from prior work.
- Claims are not tied to experiments, tables, figures, citations, or reviewer evidence.
- Visual evidence or captions are not self-contained enough for expert review.
- Mutable publisher or journal rules are used without live verification.
- Template-paper mining copies content instead of extracting reusable structure.
structured_output_contract:
- detected preset and task type
- selected skills/modules
- official-source and copyright-safe paper-mining warnings
- reviewer-risk checklist
- discipline-specific action plan
- next validation step
evaluation_rubrics:
- evals/rubrics/elsevier_rubric.md
- evals/rubrics/journal_adapter_rubric.md
- evals/rubrics/official_source_rubric.md
- evals/rubrics/copyright_safety_rubric.md
