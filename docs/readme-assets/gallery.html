<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PAMI Skill Suites Visual Gallery</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #091127;
      --muted: #4b5874;
      --line: #e5e9f5;
      --soft: #f6f8fc;
      --white: #ffffff;
      --pink: #f2296b;
      --orange: #ff7a1a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--white);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    header,
    .section,
    footer {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
    }

    header {
      padding: 54px 0 28px;
    }

    .eyebrow {
      color: var(--pink);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      margin: 12px 0 12px;
      font-size: clamp(38px, 6vw, 68px);
      line-height: 1.04;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 18px;
    }

    .hero-preview {
      padding: 0 0 54px;
      background: linear-gradient(180deg, #ffffff 0%, #f6f9ff 100%);
    }

    .hero-preview img {
      display: block;
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 24px 60px rgba(38, 68, 119, 0.16);
      background: #fbfcff;
    }

    .section {
      padding: 58px 0 64px;
    }

    h2 {
      margin: 0 0 20px;
      font-size: 30px;
      letter-spacing: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--white);
      box-shadow: 0 14px 34px rgba(38, 68, 119, 0.08);
    }

    .card img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      background: #ffffff;
    }

    .card div {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      align-items: center;
    }

    .card span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 720;
    }

    footer {
      padding: 30px 0 48px;
      color: #66728d;
    }
  </style>
</head>
<body>
  <header>
    <div class="eyebrow">visual gallery</div>
    <h1>PAMI Skill Suites</h1>
    <p>README-ready visuals for the suite identity, metadata-only RAG trace screens, and responsive documentation previews.</p>
  </header>

  <section class="hero-preview">
    <img src="pami-skill-suites-hero.png" alt="PAMI Skill Suites overview" />
  </section>

  <section class="section">
    <h2>Interface Previews</h2>
    <div class="grid">
      <article class="card">
        <img src="desktop-rag-trace.png" alt="RAG Trace UI" loading="lazy" />
        <div><strong>RAG Trace UI</strong><span>desktop</span></div>
      </article>
      <article class="card">
        <img src="desktop-visual-query-debugger.png" alt="Visual Query Debugger" loading="lazy" />
        <div><strong>Visual Query Debugger</strong><span>desktop</span></div>
      </article>
      <article class="card">
        <img src="mobile-rag-trace.png" alt="Mobile RAG Trace UI" loading="lazy" />
        <div><strong>Mobile RAG Trace UI</strong><span>mobile</span></div>
      </article>
    </div>
  </section>

  <footer>PAMI Skill Suites v2.7.0 visual gallery.</footer>
</body>
</html>
