offline_safe_policy: Trust tiers classify provenance and review priority. They do
  not certify live URL health unless live check scripts were run in networked mode.
tiers:
  publisher-official:
    priority: 10
    description: Publisher-wide official source such as author center, policy, template,
      publishing agreement, copyright/license, open access, AI, data/code, or permissions
      page.
  journal-official:
    priority: 9
    description: Target-journal homepage, Guide for Authors / Information for Authors,
      scope page, journal page, or submission instructions.
  society-official:
    priority: 8
    description: Society or owner page associated with a journal.
  repository-best-practice:
    priority: 4
    description: Unofficial skill-suite routing, output contract, context-safety,
      and reviewer-risk guidance.
  template-paper-observation:
    priority: 3
    description: Structural observation from lawful paper-template corpus. Never copy
      text/figures/tables/captions.
  unverified-candidate:
    priority: 1
    description: Candidate or incomplete source that requires human review before
      use for real submission advice.
tier_priority_order:
- publisher-official
- journal-official
- society-official
- repository-best-practice
- template-paper-observation
- unverified-candidate
