schema_version: '1.0'
release_version: 1.9.0
publisher: IEEE
generated_on: '2026-06-14'
purpose: Move from real limitation to technical gap to method necessity without hype.
fixed_routines:
- name: Pain-point-to-gap
  sequence:
  - application/research pain
  - why existing methods fail
  - specific missing mechanism
  - proposed design principle
  risk: Generic motivation sounds like introduction boilerplate.
- name: Toy contrast figure
  sequence:
  - old paradigm
  - observed failure
  - new insight
  - resulting architecture/algorithm
  risk: A motivation figure without contrast becomes decorative.
- name: Gap taxonomy
  sequence:
  - what is solved
  - what remains unsolved
  - where this paper sits
  - what it deliberately does not solve
  risk: Reviewers may say novelty is incremental if gap is vague.
output_contract:
- motivation ladder
- gap table
- main/motivation figure brief
- overclaim guardrails
