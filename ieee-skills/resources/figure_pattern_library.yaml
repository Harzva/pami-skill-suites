schema_version: '1.0'
release_version: 1.9.0
publisher: IEEE
generated_on: '2026-06-14'
use_scope: Reusable visual-structure patterns only; do not copy original figures.
main_figure_patterns:
- pattern_id: pipeline-overview
  when_to_use: method paper with multi-stage architecture
  typical_panels:
  - input
  - module stack
  - training/inference flow
  - output
  caption_moves:
  - state overall task
  - name modules
  - explain arrows
  - state result role
  reviewer_risk: Too many arrows without data/evidence flow.
- pattern_id: taxonomy-map
  when_to_use: survey or method-positioning paper
  typical_panels:
  - categories
  - method families
  - cross-links
  - representative works
  caption_moves:
  - define taxonomy axis
  - explain grouping
  - avoid exhaustive claims unless complete
  reviewer_risk: Taxonomy may look arbitrary if axes are not defined.
- pattern_id: problem-to-solution-overview
  when_to_use: new method motivated by a clear failure mode
  typical_panels:
  - problem setting
  - failure mode
  - core insight
  - proposed mechanism
  caption_moves:
  - contrast old/new
  - identify bottleneck
  - preview technical remedy
  reviewer_risk: Motivation becomes marketing if not tied to evidence.
- pattern_id: evidence-centered-main-figure
  when_to_use: experimental contribution with clear empirical story
  typical_panels:
  - benchmark setup
  - key comparison
  - ablation highlight
  - qualitative example
  caption_moves:
  - state evaluation protocol
  - summarize comparison
  - point to table/section
  reviewer_risk: Embedding results in main figure can overclaim if details are absent.
