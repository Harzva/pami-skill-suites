schema_version: '1.0'
release_version: 1.9.0
publisher: IEEE
generated_on: '2026-06-14'
routine_libraries:
  experiment_organization:
    purpose: Convert experimental evidence into a reviewer-legible chain from protocol
      to result to interpretation.
    fixed_routines:
    - name: Setup-first protocol
      sequence:
      - task/dataset
      - baselines
      - metrics
      - implementation details
      - fairness controls
      - result table
      - interpretation
      risk: Missing implementation details makes gains look non-reproducible.
    - name: Claim-evidence alignment
      sequence:
      - claim
      - primary metric
      - supporting table/figure
      - statistical/ablation support
      - failure case
      risk: Overclaiming if a claim is not backed by an explicit result.
    - name: Ablation staircase
      sequence:
      - base model
      - add component A
      - add component B
      - full model
      - sensitivity/failure analysis
      risk: Ablation without rationale reads like parameter fishing.
    - name: Fair comparison block
      sequence:
      - same split
      - same metric
      - same training budget
      - same input resolution/feature
      - same test protocol
      risk: Reviewers will attack unfair or under-specified baselines.
    output_contract:
    - experiment map
    - claim-evidence table
    - missing baseline list
    - reviewer-risk checklist
  formula_organization:
    purpose: Make mathematical notation serve the method narrative instead of becoming
      opaque decoration.
    fixed_routines:
    - name: Define-before-use
      sequence:
      - symbol table
      - problem setting
      - objective
      - constraints
      - optimization/algorithm link
      risk: Undefined symbols break reviewer trust.
    - name: Equation-to-algorithm bridge
      sequence:
      - mathematical objective
      - closed-form/intuitive reading
      - algorithmic step
      - complexity/implementation note
      risk: Equations that do not map to implementation feel ornamental.
    - name: Assumption-lemma-consequence
      sequence:
      - assumption
      - formal statement
      - proof sketch or citation
      - practical consequence
      risk: Theoretical claims without assumptions invite rejection.
    - name: Notation consistency audit
      sequence:
      - dimensions
      - indices
      - sets
      - random variables
      - loss terms
      - hyperparameters
      risk: Notation drift causes method ambiguity.
    output_contract:
    - notation table
    - equation purpose map
    - implementation bridge
    - ambiguity list
  motivation_organization:
    purpose: Move from real limitation to technical gap to method necessity without
      hype.
    fixed_routines:
    - name: Pain-point-to-gap
      sequence:
      - application/research pain
      - why existing methods fail
      - specific missing mechanism
      - proposed design principle
      risk: Generic motivation sounds like introduction boilerplate.
    - name: Toy contrast figure
      sequence:
      - old paradigm
      - observed failure
      - new insight
      - resulting architecture/algorithm
      risk: A motivation figure without contrast becomes decorative.
    - name: Gap taxonomy
      sequence:
      - what is solved
      - what remains unsolved
      - where this paper sits
      - what it deliberately does not solve
      risk: Reviewers may say novelty is incremental if gap is vague.
    output_contract:
    - motivation ladder
    - gap table
    - main/motivation figure brief
    - overclaim guardrails
  limitations_future_work:
    purpose: Show intellectual honesty while protecting the main contribution.
    fixed_routines:
    - name: Boundary-not-defect
      sequence:
      - scope boundary
      - why boundary exists
      - evidence that main claim still holds
      - future extension
      risk: Limitations framed as defects undermine contribution.
    - name: Failure-case taxonomy
      sequence:
      - failure mode
      - trigger condition
      - observed effect
      - mitigation/future work
      risk: Unstructured limitations look defensive.
    - name: Ethics-deployment caution
      sequence:
      - deployment condition
      - risk
      - guardrail
      - evaluation needed before deployment
      risk: High-impact application papers need responsible caveats.
    output_contract:
    - limitations table
    - future work ladder
    - deployment caveat
    - reviewer-risk note
  conclusion_organization:
    purpose: Close the paper by restating contribution, evidence, and future trajectory
      without redoing the abstract.
    fixed_routines:
    - name: Contribution-evidence-impact
      sequence:
      - problem revisited
      - method contribution
      - key evidence
      - broader technical implication
      - future direction
      risk: Conclusion that merely repeats results feels weak.
    - name: Takeaway compression
      sequence:
      - one-sentence core takeaway
      - two evidence anchors
      - one limitation/future bridge
      risk: Too many claims dilute the final message.
    - name: No-new-claims rule
      sequence:
      - only claims already supported
      - no new experiments
      - no new terminology
      - no unsupported application promise
      risk: New claims in conclusion can trigger reviewer skepticism.
    output_contract:
    - closing paragraph skeleton
    - evidence anchors
    - safe future-work sentence
    - no-new-claim audit
