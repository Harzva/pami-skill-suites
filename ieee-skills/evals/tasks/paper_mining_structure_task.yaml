    flag assumptions and risks
required_modules:
- journal:pami
- skill:ieee-paper-miner
- component:method
- component:experiment
expected_output_sections:
- selected skills/modules
- diagnosis
- revised_or_generated_output
- reviewer-risk checklist
- official-source warning
- structured output contract
rubrics:
- journal_adapter_rubric.md
- paper_mining_rubric.md
- copyright_safety_rubric.md
- ieee_rubric.md
sample_output: evals/sample_outputs/ieee_paper_mining_structure_task_001.md
safety_warnings:
