schema_version: 2.0.0
purpose: Backlog slots for building a 100+ legally sourced main-figure corpus. These
  are not populated papers.
target_total_main_figures: 100
status: pending_oa_source_collection_and_permission_review
required_fields: &id001
- paper_id
- title
- journal
- year
- doi
- license
- source_url
- main_figure_path
- caption_or_safe_summary
- visual_rhetoric_tags
- linked_paper_section
- reusable_structure_lessons
- copyright_safety_note
allowed_sources:
- open-access paper
- CC BY / CC BY-NC / explicitly licensed PDF
- publisher-permitted OA PDF
- author/institution repository OA version
prohibited_sources:
- Sci-Hub
- pirated PDF
- paywalled-only PDF
- copyright-unknown PDF
- unauthorized reproduction
